services:
  app:
    build:
      context: ./SKufar-Notify
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - SKUFAR_USERNAME=admin
      - SKUFAR_PASSWORD=admin
      - SKUFAR_TG_TOKEN=
      - SKUFAR_TG_CHAT=
    volumes:
      - skufar_data:/app/Data
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  skufar_data:
